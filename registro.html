<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #34495e;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        select,
        textarea {
            padding: 10px 12px;
            font-size: 14px;
            border: 2px solid #ecf0f1;
            border-radius: 4px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="date"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #3498db;
        }

        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            font-weight: 400;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button[type="submit"] {
            background-color: #3498db;
            color: white;
        }

        button[type="submit"]:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        button[type="reset"] {
            background-color: #95a5a6;
            color: white;
        }

        button[type="reset"]:hover {
            background-color: #7f8c8d;
            transform: translateY(-2px);
        }

        .help-text {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: -2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Crear Cuenta</h1>
        <form action="/registro" method="POST">
            <!-- Nombre de Usuario (Ejercicio 1: Label + ID) -->
            <div class="form-group">
                <label for="usuario">Nombre de Usuario</label>
                <input 
                    type="text" 
                    id="usuario" 
                    name="usuario" 
                    required
                >
            </div>

            <!-- Email (Ejercicio 2: Type Email + Required) -->
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    autocomplete="email"
                    required
                >
            </div>

            <!-- Contraseña (Ejercicio 3: Minlength) -->
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    autocomplete="new-password"
                    minlength="8" 
                    required
                >
                <p class="help-text">Mínimo 8 caracteres</p>
            </div>

            <!-- Confirmar Contraseña -->
            <div class="form-group">
                <label for="password_confirm">Confirmar Contraseña</label>
                <input 
                    type="password" 
                    id="password_confirm" 
                    name="password_confirm"
                    minlength="8" 
                    required
                >
            </div>

            <!-- Fecha de Nacimiento (Ejercicio 4: Type Date) -->
            <div class="form-group">
                <label for="fecha_nacimiento">Fecha de Nacimiento</label>
                <input 
                    type="date" 
                    id="fecha_nacimiento" 
                    name="fecha_nacimiento"
                    required
                >
            </div>

            <!-- Habilidades (Ejercicio 5: Checkboxes) -->
            <div class="form-group">
                <label>Habilidades</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input 
                            type="checkbox" 
                            id="html" 
                            name="habilidades" 
                            value="HTML"
                        >
                        <label for="html">HTML</label>
                    </div>
                    <div class="checkbox-item">
                        <input 
                            type="checkbox" 
                            id="css" 
                            name="habilidades" 
                            value="CSS"
                        >
                        <label for="css">CSS</label>
                    </div>
                    <div class="checkbox-item">
                        <input 
                            type="checkbox" 
                            id="javascript" 
                            name="habilidades" 
                            value="JavaScript"
                        >
                        <label for="javascript">JavaScript</label>
                    </div>
                </div>
            </div>

            <!-- Experiencia Previa (Ejercicio 6: Textarea) -->
            <div class="form-group">
                <label for="experiencia">Experiencia Previa</label>
                <textarea 
                    id="experiencia" 
                    name="experiencia"
                    rows="4"
                ></textarea>
            </div>

            <!-- Provincia (Ejercicio 7: Select) -->
            <div class="form-group">
                <label for="provincia">Provincia</label>
                <select id="provincia" name="provincia" required>
                    <option value="">Seleccioná tu provincia</option>
                    <option value="Buenos Aires">Buenos Aires</option>
                    <option value="Córdoba">Córdoba</option>
                    <option value="Santa Fe">Santa Fe</option>
                </select>
            </div>

            <!-- Código de Referencia (Ejercicio 8: Title) -->
            <div class="form-group">
                <label for="codigo_referencia">Código de Referencia</label>
                <input 
                    type="text" 
                    id="codigo_referencia" 
                    name="codigo_referencia"
                    title="Debe tener 4 números (ej: 2026)"
                >
            </div>

            <!-- Botones (Ejercicio 10: Submit vs Button) -->
            <div class="button-group">
                <button type="submit">Registrarse</button>
                <button type="reset">Limpiar</button>
            </div>
        </form>
    </div>
</body>
</html>
